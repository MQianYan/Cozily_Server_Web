    <style>
        :root {
            --primary:    #D7BDE2;      /* 淡紫主色 */
            --primary-d:  #A084DC;      /* 深紫 */
            --primary-l:  #E6D0F2;      /* 浅紫 */
            --bg:         #F8F5FC;      /* 背景 */
            --card-bg:    rgba(255,255,255,0.78);
            --text:       #2D1B47;
            --text-light: #5A4A6E;
            --border:     rgba(161,132,220,0.28);
            --shadow:     0 8px 32px rgba(161,132,220,0.18);
        }

        [data-theme="dark"] {
            --primary:    #A084DC;
            --primary-d:  #7B5EB8;
            --primary-l:  #D7BDE2;
            --bg:         #1A1425;
            --card-bg:    rgba(42,33,64,0.82);
            --text:       #E3D8F2;
            --text-light: #C4B3E0;
            --border:     rgba(177,156,217,0.20);
            --shadow:     0 8px 32px rgba(0,0,0,0.50);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Quicksand', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s, color 0.4s;
        }

        /* 顶部磨砂栏 - 紧凑间距 */
        .top-bar {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-d));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .logo i {
            font-size: 2rem;
            color: var(--primary);
        }

        .nav {
            display: flex;
            list-style: none;
            gap: 0.3rem;
        }

        .nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            position: relative;
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            background: transparent;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .nav a:hover {
            background: rgba(215, 189, 226, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(215, 189, 226, 0.3);
            color: var(--primary-d);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(161, 132, 220, 0.15);
        }

        .nav a.active {
            color: var(--primary-d);
            background: rgba(215, 189, 226, 0.1);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(215, 189, 226, 0.2);
        }

        .nav a.active::after {
            content: "";
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        .right-tools {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .theme-toggle, .join-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            color: var(--primary-d);
            transform: scale(1.1);
        }

        .join-btn {
            background: var(--primary);
            color: var(--text);
            padding: 0.5rem 1.2rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }

        .join-btn:hover {
            background: var(--primary-d);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        /* ===== 主要内容区 ===== */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2.5rem 5rem;
        }

        /* 头部简洁介绍 */
        .page-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .page-header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-d));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.8rem;
        }

        .page-header .subhead {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
            opacity: 0.9;
        }

        /* 团队成员网格 */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
        }

        /* 团队卡片 */
        .team-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem 1.5rem 1.8rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .team-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(161, 132, 220, 0.25);
            border-color: var(--primary-l);
        }

        /* ===== 头像 - 强制圆角 ===== */
        .member-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50% !important;        /* 强制圆形 */
            background: rgba(215, 189, 226, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            border: 3px solid var(--primary-l);
            transition: border-color 0.2s;
            font-size: 2.4rem;
            font-weight: 600;
            color: var(--primary-d);
            overflow: hidden !important;            /* 强制隐藏溢出 */
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;                       /* 图片缩放裁剪 */
            border-radius: 50% !important;           /* 确保图片也是圆形 */
            display: block;
        }

        .team-card:hover .member-avatar {
            border-color: var(--primary);
        }

        /* 姓名 */
        .member-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }

        /* 角色标签 */
        .member-role {
            display: inline-block;
            background: rgba(215, 189, 226, 0.15);
            padding: 0.3rem 1.2rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-d);
            margin-bottom: 1rem;
            border: 1px solid rgba(215, 189, 226, 0.2);
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }

        /* 个人简介 */
        .member-bio {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0.5rem 0 1.2rem;
            flex: 1;
        }

        /* 社交链接 */
        .member-social {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1.2rem;
            width: 100%;
            justify-content: center;
        }

        .member-social a {
            color: var(--text-light);
            font-size: 1.2rem;
            transition: all 0.2s;
            background: rgba(215, 189, 226, 0.08);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .member-social a:hover {
            color: var(--primary-d);
            background: rgba(215, 189, 226, 0.2);
            border-color: rgba(215, 189, 226, 0.3);
            transform: translateY(-2px);
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 3rem 2rem 2.5rem;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            background: var(--bg);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .top-bar {
                padding: 0.4rem 1rem;
            }
            .nav {
                gap: 0.2rem;
            }
            .nav a {
                padding: 0.3rem 0.6rem;
                font-size: 0.9rem;
            }
            .main-content {
                padding: 3rem 1.5rem;
            }
            .page-header h1 {
                font-size: 2.6rem;
            }
            .page-header .subhead {
                font-size: 1rem;
            }
            .team-grid {
                gap: 1.5rem;
            }
            .member-avatar {
                width: 85px;
                height: 85px;
                font-size: 2rem;
            }
            .member-name {
                font-size: 1.5rem;
            }
            .member-social a {
                width: 28px;
                height: 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>

    <script>
        // 日夜模式切换
        const themeToggle = document.querySelector('.theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.innerHTML = savedTheme === 'dark' ? '<i class="mdi mdi-white-balance-sunny"></i>' : '<i class="mdi mdi-weather-night"></i>';

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            theme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeToggle.innerHTML = theme === 'dark' ? '<i class="mdi mdi-white-balance-sunny"></i>' : '<i class="mdi mdi-weather-night"></i>';
        });
