<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - 鼠鼠安乐窝 | Minecraft服务器</title>
    <meta name="description" content="鼠鼠安乐窝 - 高质量Minecraft生电服务器">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <style>
        :root {
            --primary: #D7BDE2;
            --primary-d: #A084DC;
            --primary-l: #E6D0F2;
            --bg: #F8F5FC;
            --card-bg: rgba(255,255,255,0.85);
            --text: #2D1B47;
            --text-light: #5A4A6E;
            --border: rgba(161,132,220,0.25);
            --shadow: 0 8px 32px rgba(161,132,220,0.15);
        }
        [data-theme="dark"] {
            --primary: #A084DC;
            --primary-d: #7B5EB8;
            --bg: #1A1425;
            --card-bg: rgba(42,33,64,0.9);
            --text: #E3D8F2;
            --text-light: #C4B3E0;
            --border: rgba(177,156,217,0.2);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Quicksand', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* 左侧导航 */
        .sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 220px;
            height: 100vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        .sidebar-logo {
            padding: 25px 20px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-d));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-nav {
            flex: 1;
            padding: 15px 0;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 20px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }
        .sidebar-nav a:hover {
            background: rgba(215,189,226,0.12);
            color: var(--primary-d);
            border-left-color: var(--primary);
        }
        .sidebar-nav a.active {
            background: rgba(215,189,226,0.18);
            color: var(--primary-d);
            border-left-color: var(--primary-d);
            font-weight: 600;
        }
        .sidebar-nav a i { font-size: 1.1rem; width: 22px; }
        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
        }
        .theme-btn {
            width: 100%;
            padding: 10px;
            background: rgba(215,189,226,0.12);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .theme-btn:hover {
            background: rgba(215,189,226,0.2);
            color: var(--primary-d);
        }

        /* 主内容 */
        .main-content {
            margin-left: 220px;
            padding: 40px;
            max-width: 900px;
        }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-d));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .hero .tagline {
            font-size: 1.2rem;
            color: var(--text-light);
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-d);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title i { font-size: 1.5rem; }
        .ip-box {
            background: linear-gradient(135deg, var(--primary), var(--primary-d));
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .ip-box:hover { transform: scale(1.02); }
        .version-info {
            margin-top: 15px;
            color: var(--text-light);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-d));
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(160,132,220,0.3); }
        .btn-secondary {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-secondary:hover { border-color: var(--primary); }

        /* 功能卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .feature {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        .feature:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
        .feature i { font-size: 2rem; color: var(--primary-d); margin-bottom: 10px; }
        .feature h3 { font-size: 1rem; margin-bottom: 8px; }
        .feature p { font-size: 0.85rem; color: var(--text-light); }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .features { grid-template-columns: 1fr; }
        }

        /* 移动端菜单按钮 */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 15px; left: 15px;
            z-index: 101;
            width: 44px; height: 44px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        @media (max-width: 768px) {
            .mobile-toggle { display: flex; }
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
    </style>
</head>
<body>
    <button class="mobile-toggle" onclick="toggleSidebar()">
        <i class="mdi mdi-menu"></i>
    </button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo">Cozily</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="active"><i class="mdi mdi-home"></i> 首页</a>
            <a href="dibiao.html"><i class="mdi mdi-map-marker"></i> 玩家地标</a>
            <a href="licheng.html"><i class="mdi mdi-timeline-clock"></i> 服务器历程</a>
            <a href="zonghe.html"><i class="mdi mdi-compass"></i> 综合导航</a>
            <a href="shenrenbang.html"><i class="mdi mdi-trophy"></i> 神人榜</a>
            <a href="tuandui.html"><i class="mdi mdi-account-group"></i> 团队介绍</a>
            <a href="faq.html"><i class="mdi mdi-help-circle"></i> 常见问题</a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-btn" onclick="toggleTheme()">
                <i class="mdi mdi-weather-night"></i> 切换主题
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="hero">
            <h1>鼠鼠安乐窝</h1>
            <p class="tagline">欢迎来到CozilyMC！</p>
        </div>

        <div class="card">
            <div class="card-title"><i class="mdi mdi-server"></i> 服务器信息</div>
            <div class="ip-box" onclick="copyIP()">mc.cozily.top</div>
            <div class="version-info">
                <span><i class="mdi mdi-pickaxe"></i> 生电</span>
                <span><i class="mdi mdi-check-circle"></i> 全版本</span>
                <span><i class="mdi mdi-login"></i> 离线登录</span>
            </div>
            <div class="btn-group">
                <a href="#" class="btn btn-primary">立即加入</a>
                <a href="https://qm.qq.com/q/VTUeknT88Q" class="btn btn-secondary">加入交流群</a>
            </div>
        </div>

        <div class="features">
            <div class="feature">
                <i class="mdi mdi-rocket-launch"></i>
                <h3>低性能硬件</h3>
                <p>土豆服务器 保证卡的要死</p>
            </div>
            <div class="feature">
                <i class="mdi mdi-account-group"></i>
                <h3>LJ社区</h3>
                <p>腐竹就是熊孩子</p>
            </div>
            <div class="feature">
                <i class="mdi mdi-party-popper"></i>
                <h3>没有玩法</h3>
                <p>没钱了根本没法更新</p>
            </div>
            <div class="feature">
                <i class="mdi mdi-shield-check"></i>
                <h3>NO安全</h3>
                <p>只对外挂一片净土</p>
            </div>
        </div>

        <footer>
            <p>© 2026 CozilyMC. All rights reserved.</p>
            <p>Minecraft™ 是 Mojang Studios 及 Microsoft 的商标。</p>
        </footer>
    </main>

    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        function copyIP() {
            navigator.clipboard.writeText('mc.cozily.top');
            alert('服务器IP已复制！');
        }
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        });
    </script>
</body>
</html>
